name: CI

on:
  push:
    branches: ["main", "phase-*"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-wasip1
          components: clippy, rustfmt

      - name: Cache cargo registry + build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --locked

      - name: cargo build (wasm release)
        run: cargo build --locked --release --target wasm32-wasip1

      - name: Binary size check (≤1.5 MB)
        run: |
          WASM=target/wasm32-wasip1/release/zextract.wasm
          SIZE=$(wc -c < "$WASM")
          LIMIT=$((1500 * 1024))
          echo "Binary size: ${SIZE} bytes (limit: ${LIMIT})"
          if [ "$SIZE" -gt "$LIMIT" ]; then
            echo "ERROR: wasm binary exceeds 1.5 MB budget"
            exit 1
          fi

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v4
        with:
          name: zextract-wasm
          path: target/wasm32-wasip1/release/zextract.wasm
          retention-days: 7
